<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExcelTools — Phase 0 Capability Spike</title>
    <style>
      body { font: 15px/1.5 system-ui, sans-serif; margin: 0; padding: 24px; background: #0d1117; color: #e6edf3; }
      h1 { font-size: 20px; }
      .sub { color: #8b949e; margin-bottom: 20px; }
      table { border-collapse: collapse; width: 100%; max-width: 760px; }
      td { padding: 8px 10px; border-bottom: 1px solid #21262d; vertical-align: top; }
      .name { font-weight: 600; }
      .detail { color: #8b949e; font-size: 13px; }
      .pass { color: #3fb950; font-weight: 700; }
      .fail { color: #f85149; font-weight: 700; }
      .warn { color: #d29922; font-weight: 700; }
      .actions { margin: 16px 0; max-width: 760px; }
      button { background: #1f6feb; color: #fff; border: 0; padding: 9px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
      input[type=file] { color: #8b949e; }
      code { background: #161b22; padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>ExcelTools — Phase 0 Capability Spike</h1>
    <div class="sub">
      Self-contained. Copy this one file to a target work PC and open it.
      It checks every risky browser capability the suite depends on. Nothing is
      uploaded — all checks run locally.
    </div>

    <table id="results"></table>

    <div class="actions">
      <p class="detail">The File + Download checks are interactive:</p>
      <input type="file" id="file" accept=".xlsx,.xls,.csv" />
      <button id="dl">Test local download</button>
      <div id="fileresult" class="detail"></div>
    </div>

    <script>
      const rows = [];
      function add(name, status, detail) {
        rows.push({ name, status, detail });
        render();
      }
      function render() {
        document.getElementById('results').innerHTML = rows.map(r => {
          const cls = r.status === 'PASS' ? 'pass' : r.status === 'FAIL' ? 'fail' : 'warn';
          return `<tr><td class="name">${r.name}</td>` +
                 `<td class="${cls}">${r.status}</td>` +
                 `<td class="detail">${r.detail || ''}</td></tr>`;
        }).join('');
      }

      // Environment
      add('User agent', 'INFO', navigator.userAgent);
      add('Secure context', self.isSecureContext ? 'PASS' : 'WARN',
          self.isSecureContext ? 'Service workers allowed here.'
            : 'Not a secure context (likely file://). Service worker / PWA disabled; app still works without offline caching.');
      add('crossOriginIsolated', crossOriginIsolated ? 'PASS' : 'WARN',
          crossOriginIsolated ? 'WASM threads / SharedArrayBuffer available (faster DuckDB).'
            : 'No COOP/COEP headers. WASM threads unavailable; single-threaded WASM still works.');

      // WebAssembly on the main thread — minimal valid module (exports add(a,b))
      const WASM_ADD = new Uint8Array([
        0,97,115,109,1,0,0,0,1,7,1,96,2,127,127,1,127,3,2,1,0,7,7,1,3,
        97,100,100,0,0,10,9,1,7,0,32,0,32,1,106,11
      ]);
      (async () => {
        try {
          const { instance } = await WebAssembly.instantiate(WASM_ADD);
          const ok = instance.exports.add(19, 23) === 42;
          add('WebAssembly (main thread)', ok ? 'PASS' : 'FAIL',
              ok ? 'Compiled and ran a WASM module.' : 'Ran but wrong result.');
        } catch (e) {
          add('WebAssembly (main thread)', 'FAIL', String(e));
        }
      })();

      // Web Worker + WASM inside the worker
      (async () => {
        try {
          const src = `
            self.onmessage = async (ev) => {
              try {
                const { instance } = await WebAssembly.instantiate(ev.data);
                self.postMessage({ ok: true, val: instance.exports.add(1, 2) });
              } catch (e) { self.postMessage({ ok: false, err: String(e) }); }
            };`;
          const url = URL.createObjectURL(new Blob([src], { type: 'text/javascript' }));
          const w = new Worker(url);
          const result = await new Promise((res) => {
            w.onmessage = (e) => res(e.data);
            w.onerror = (e) => res({ ok: false, err: e.message });
            w.postMessage(WASM_ADD);
            setTimeout(() => res({ ok: false, err: 'timeout' }), 3000);
          });
          w.terminate(); URL.revokeObjectURL(url);
          add('Web Worker + WASM', result.ok ? 'PASS' : 'FAIL',
              result.ok ? 'Worker spawned and compiled WASM (result ' + result.val + ').'
                        : 'Failed: ' + result.err);
        } catch (e) {
          add('Web Worker + WASM', 'FAIL', String(e));
        }
      })();

      // Service worker availability (registration only meaningful on http/https)
      if ('serviceWorker' in navigator && self.isSecureContext) {
        add('Service Worker API', 'PASS', 'Available; PWA offline caching supported on this origin.');
      } else if (!self.isSecureContext) {
        add('Service Worker API', 'WARN', 'Unavailable under file://. Serve from an internal host for offline PWA.');
      } else {
        add('Service Worker API', 'FAIL', 'Not supported by this browser.');
      }

      // File input (interactive)
      document.getElementById('file').addEventListener('change', (ev) => {
        const f = ev.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => {
          const bytes = new Uint8Array(reader.result);
          document.getElementById('fileresult').innerHTML =
            `<span class="pass">PASS</span> Read <code>${f.name}</code> — ${bytes.length.toLocaleString()} bytes, locally, no upload.`;
        };
        reader.onerror = () => {
          document.getElementById('fileresult').innerHTML = `<span class="fail">FAIL</span> Could not read file.`;
        };
        reader.readAsArrayBuffer(f);
      });

      // Local download (interactive)
      document.getElementById('dl').addEventListener('click', () => {
        try {
          const blob = new Blob(['ExcelTools spike — local download works\n'], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'exceltools-spike.txt';
          document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
          document.getElementById('fileresult').innerHTML =
            `<span class="pass">PASS</span> Triggered a local file download.`;
        } catch (e) {
          document.getElementById('fileresult').innerHTML = `<span class="fail">FAIL</span> ${e}`;
        }
      });
    </script>
  </body>
</html>
